<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quran Put on</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Vazirmatn:wght@400;700&family=Cairo:wght@400;700&family=Poppins:wght@400;600&family=Amiri+Quran&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1c1c1c;
      --box-bg: #181818;
      --text-main: #e0e0e0;
      --text-muted: #888888;
      --border-color: #2a2a2a;
      --accent: #f1c40f; 
      --blur-bg: rgba(0, 0, 0, 0.7);
      --shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --bg-color: #eef0f3;
      --surface-color: #ffffff;
      --box-bg: #f8f9fa;
      --text-main: #333333;
      --text-muted: #7f8c8d;
      --border-color: #dcdde1;
      --accent: #8e44ad; 
      --blur-bg: rgba(238, 240, 243, 0.6);
      --shadow: 0 8px 30px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color); color: var(--text-main);
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: background-color 0.5s ease, color 0.5s ease;
      overflow-x: hidden;
    }

    header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; max-width: 600px; }
    .logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 800; color: var(--accent); margin: 0; letter-spacing: 2px; transition: color 0.4s ease; }

    .menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 100; padding: 5px;}
    .menu-btn span { display: block; width: 32px; height: 3px; background-color: var(--text-main); border-radius: 3px; transition: all 0.3s ease; }

    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--blur-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 90; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    .sidebar { position: fixed; top: 0; right: -75%; width: 65%; max-width: 320px; height: 100%; background-color: var(--surface-color); box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 95; padding: 80px 20px 20px; display: flex; flex-direction: column; gap: 30px; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border-color);}
    [dir="ltr"] .sidebar { right: auto; left: -75%; border-left: none; border-right: 1px solid var(--border-color); box-shadow: 5px 0 25px rgba(0,0,0,0.1); transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    [dir="ltr"] .sidebar.active { left: 0; }
    [dir="rtl"] .sidebar.active { right: 0; }
    
    .sidebar-title { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

    .lang-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; cursor: pointer; font-size: 15px; transition: all 0.3s; width: 100%; margin-bottom: 10px; }
    .lang-btn.active, .lang-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

    .theme-switch-container { display: flex; align-items: center; justify-content: space-between; background: var(--box-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--border-color); }
    .theme-switch { position: relative; display: inline-block; width: 64px; height: 34px; }
    .theme-switch input { opacity: 0; width: 0; height: 0; }
    .slider.round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2c3e50; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 34px; overflow: hidden;}
    .slider.round:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
    .slider .icon { position: absolute; top: 50%; transform: translateY(-50%); font-size: 16px; z-index: 1; transition: 0.4s; }
    .slider .moon { right: 8px; color: #f1c40f; }
    .slider .sun { left: 8px; color: #f39c12; opacity: 0; }
    input:checked + .slider.round { background-color: #e0e0e0; }
    input:checked + .slider.round:before { transform: translateX(30px); background-color: #fff; }
    input:checked + .slider.round .moon { opacity: 0; }
    input:checked + .slider.round .sun { opacity: 1; }

    .theme-colors { display: flex; gap: 12px; justify-content: center; margin-top: 15px;}
    .t-color { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .t-color.active { border-color: var(--text-main); transform: scale(1.2); }

    /* Credit Button & Modal */
    .credit-wrapper { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); }
    .credit-btn { width: 100%; background: transparent; color: var(--accent); border: 1px dashed var(--accent); padding: 12px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: bold;}
    .credit-btn:hover { background: var(--accent); color: #fff; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--blur-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s ease; display: flex; align-items: center; justify-content: center; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: var(--surface-color); padding: 40px 30px; border-radius: 20px; box-shadow: var(--shadow); transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; width: 90%; max-width: 400px; border: 1px solid var(--border-color); }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-text { font-family: 'Amiri Quran', serif; font-size: 45px; color: var(--accent); transition: color 0.4s ease; line-height: 1.5; }

    .main-content { width: 100%; max-width: 600px; padding: 0 15px; }
    
    /* داینامیک کردنی قەبارەی وێنە بۆ هەر فۆرماتێک */
    .image-container { position: relative; width: 100%; min-height: 350px; background-color: var(--surface-color); border: 1px dashed var(--border-color); border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s ease; box-shadow: var(--shadow); }
    .image-container:hover { border-color: var(--accent); }
    #placeholderText { color: var(--text-muted); font-size: 15px; text-align: center; font-family: inherit;}
    
    #myImage { width: 100%; height: auto; object-fit: contain; display: none; transition: filter 0.3s ease; }
    #imageInput { display: none; }

    #quranText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; text-align: center; text-shadow: 2px 2px 10px rgba(0,0,0,0.9), 0px 0px 5px rgba(0,0,0,0.7); display: none; font-family: 'Amiri Quran', serif; color: #ffffff; font-size: 30px; line-height: 1.6; pointer-events: none; transition: color 0.4s ease; z-index: 10; }

    .controls-container { width: 100%; margin-top: 25px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px;}
    .control-box { background-color: var(--box-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); transition: background-color 0.5s, border 0.5s;}
    
    .slider-header { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-top: 15px; }
    .slider-value { color: var(--accent); font-weight: bold; font-family: 'Poppins', sans-serif;}
    input[type="range"] { width: 100%; margin: 10px 0 20px 0; accent-color: var(--accent); height: 6px; border-radius: 5px; outline: none; cursor: pointer;}

    .btn-grid { display: flex; flex-wrap: wrap; gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 5px;}
    .btn-grid::-webkit-scrollbar { width: 5px; }
    .btn-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }

    .item-btn { background-color: var(--surface-color); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
    .ayah-btn { font-size: 16px; font-family: 'Amiri Quran', serif; flex-grow: 1; text-align: center;}
    .font-btn { font-size: 16px; flex-grow: 1; text-align: center; direction: ltr;}
    .color-btn { width: 40px; height: 40px; border-radius: 50%; padding: 0; border: 2px solid transparent;}
    .filter-btn { font-size: 14px; flex-grow: 1; text-align: center; }

    .item-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.08);}
    .item-btn:active { transform: scale(0.95); }
    .item-btn.selected { background-color: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.15);}
    
    .save-btn { width: 100%; background-color: var(--accent); color: #fff; font-size: 18px; font-weight: bold; border: none; display: flex; justify-content: center; align-items: center; padding: 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-family: inherit;}
    .save-btn:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>

  <header>
    <h1 class="logo">QURAN PUT ON</h1>
    <button class="menu-btn" id="menuBtn">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="sidebar-title" data-i18n="lang">Language</div>
      <button class="lang-btn" style="font-family: 'Vazirmatn', sans-serif;" onclick="setLang('ku')">کوردی</button>
      <button class="lang-btn" style="font-family: 'Cairo', sans-serif;" onclick="setLang('ar')">العربية</button>
      <button class="lang-btn active" style="font-family: 'Poppins', sans-serif;" onclick="setLang('en')">English</button>
    </div>
    <div>
      <div class="sidebar-title" data-i18n="theme">Theme</div>
      <div class="theme-switch-container">
        <span data-i18n="mode" style="font-size: 14px; font-weight: bold;">Dark Mode</span>
        <label class="theme-switch" for="themeCheckbox">
          <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
          <div class="slider round">
            <span class="icon moon">🌙</span>
            <span class="icon sun">☀️</span>
          </div>
        </label>
      </div>
      <div class="theme-colors" id="themeColorPalette"></div>
    </div>
    
    <div class="credit-wrapper">
      <button class="credit-btn" onclick="openModal()" data-i18n="creditBtn">Credits</button>
    </div>
  </aside>

  <div class="modal-overlay" id="creditModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-text">فِي سَبِيلِ اللَّهِ</div>
    </div>
  </div>

  <main class="main-content">
    <div class="image-wrapper">
      <label for="imageInput" class="image-container" id="imgContainer">
        <span id="placeholderText" data-i18n="placeholder">Tap to upload image</span>
        <img id="myImage" src="" alt="Image">
        <div id="quranText"></div>
      </label>
      <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="controls-container">
      
      <button id="saveBtn" class="item-btn save-btn">
        <span id="saveText" data-i18n="save">Download</span>
      </button>

      <div class="control-box">
        <div class="sidebar-title" data-i18n="filtersTitle">Filters</div>
        <div id="filterButtons" class="btn-grid"></div>
      </div>

      <div class="control-box">
        <div class="slider-header"><span data-i18n="size">Size</span> <span class="slider-value" id="sizeVal">30</span></div>
        <input type="range" id="sizeSlider" min="10" max="100" value="30">
        
        <div class="slider-header"><span data-i18n="yAxis">Y Axis</span> <span class="slider-value" id="yVal">50</span></div>
        <input type="range" id="ySlider" min="0" max="100" value="50">
        
        <div class="slider-header"><span data-i18n="xAxis">X Axis</span> <span class="slider-value" id="xVal">50</span></div>
        <input type="range" id="xSlider" min="0" max="100" value="50">
      </div>

      <div class="control-box">
        <div class="sidebar-title" data-i18n="fonts">Fonts</div>
        <div id="fontButtons" class="btn-grid"></div>
      </div>

      <div class="control-box">
        <div class="sidebar-title" data-i18n="colors">Colors</div>
        <div id="colorButtons" class="btn-grid"></div>
      </div>

      <div class="control-box">
        <div class="sidebar-title" data-i18n="ayahs">Ayahs</div>
        <div id="ayahButtons" class="btn-grid"></div>
      </div>
    </div>
  </main>

  <script>

      const dict = {
        en: { lang: "Language", theme: "Theme", ayahs: "Ayahs", fonts: "Fonts", colors: "Colors", size: "Size", xAxis: "X Axis", yAxis: "Y Axis", placeholder: "Tap to upload image", modeD: "Light Mode", modeL: "Dark Mode", save: "Download", creditBtn: "Credits", filtersTitle: "Filters", font: "'Poppins', sans-serif", err: "Please select an image first!" },

      };

      // ٢٥ فلتەری سینەمایی
      const filtersList = [
        { name: {en: "Normal", ar: "أصلي", ku: "ئاسایی"}, css: "none" },
        { name: {en: "Cinematic", ar: "سينمائي", ku: "سینەمایی"}, css: "contrast(1.2) saturate(1.2) brightness(0.85)" },

        { name: {en: "Rose", ar: "وردي", ku: "پەمەیی"}, css: "hue-rotate(-30deg) saturate(1.2) brightness(1.1)" },
        { name: {en: "Midnight", ar: "منتصف الليل", ku: "نیوەشەو"}, css: "contrast(1.2) brightness(0.5) saturate(1.1)" },
        { name: {en: "HDR", ar: "إتش دي آر", ku: "ئێچ دی ئاڕ"}, css: "contrast(1.3) saturate(1.3) brightness(1.1)" },
        { name: {en: "Soft", ar: "ناعم", ku: "نەرم"}, css: "contrast(0.9) brightness(1.05) saturate(0.9)" },
        { name: {en: "Intense", ar: "مكثف", ku: "چڕ"}, css: "contrast(1.4) saturate(1.4)" },
        { name: {en: "Glow", ar: "توهج", ku: "درەوشاوە"}, css: "brightness(1.2) contrast(1.1) saturate(1.2)" }
      ];

      const fonts = ['Amiri Quran', 'Amiri', 'Lateef', 'Cairo', 'Tajawal', 'Almarai', 'Aref Ruqaa', 'El Messiri', 'Reem Kufi', 'Harmattan', 'Lalezar', 'Changa', 'Mada', 'Rakkas', 'Mirza', 'Katibeh', 'Markazi Text', 'Lemonada', 'Scheherazade New', 'Noto Naskh Arabic', 'Alkalami', 'Qahiri', 'Kufam', 'IBM Plex Sans Arabic', 'Readex Pro', 'Alexandria', 'Blaka', 'Ruwudu', 'Anek Arabic', 'Noto Kufi Arabic', 'Noto Sans Arabic', 'Gulzar', 'Marhey', 'Baloo Bhaijaan 2', 'Beiruti', 'Jomhuria', 'Vazirmatn', 'Zain', 'Lama Sans', 'Vibes', 'Reem Kufi Fun', 'Reem Kufi Ink', 'Aref Ruqaa Ink', 'Blaka Ink', 'Noto Nastaliq Urdu', 'Cairo Play', 'Rubik', 'Noto Serif Arabic'];

          btn.onclick = () => {

      function loadFontAndSet(fontName, button) {
        const fontId = fontName.replace(/\s+/g, '-').toLowerCase();
        if (!document.getElementById(fontId)) {
          const link = document.createElement('link');
          link.id = fontId;
          link.rel = 'stylesheet';
          link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}&display=swap`;
          document.head.appendChild(link);
        }
        quranText.style.fontFamily = `'${fontName}', serif`;
        document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('selected'));
        button.classList.add('selected');
      }

      document.getElementById('saveBtn').addEventListener('click', function() {
        const container = document.getElementById('imgContainer');
        
        if (myImage.style.display === 'none' || !myImage.src) {
          alert(dict[currentLang].err);
          return;
        }

        const spanText = document.getElementById('saveText');
        const originalText = spanText.innerText;
        spanText.innerText = "...";

        // چارەسەری فلتەر: وێنەیەک دروست دەکەین بە فلتەرەوە تا html2canvas بیگرێت
        const originalSrc = myImage.src;
        const currentFilter = myImage.style.filter;
        
        if (currentFilter && currentFilter !== 'none') {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = myImage.naturalWidth;
          tempCanvas.height = myImage.naturalHeight;
          const ctx = tempCanvas.getContext('2d');
          ctx.filter = currentFilter;
          ctx.drawImage(myImage, 0, 0, tempCanvas.width, tempCanvas.height);
          myImage.src = tempCanvas.toDataURL('image/png');
          myImage.style.filter = 'none';
        }

        setTimeout(() => {
          html2canvas(container, {
            scale: 3,
            useCORS: true,
            backgroundColor: null
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Quran-Put-On-' + Math.floor(Math.random() * 10000) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // گەڕاندنەوە بۆ دۆخی ئاسایی
            myImage.src = originalSrc;
            myImage.style.filter = currentFilter;
            spanText.innerText = originalText;
          }).catch(err => {
            console.error(err);
            myImage.src = originalSrc;
            myImage.style.filter = currentFilter;
            spanText.innerText = originalText;
            alert("Error / کێشەیەک ڕوویدا");
          });
        }, 100);
      });

      // جێبەجێکردنی زمانی ئینگلیزی وەک بنەڕەت لە سەرەتادا
      setLang('en');
